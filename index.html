<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle do Exaustor Mundial</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            background: #222; 
            color: #fff; 
            padding-top: 50px; 
        }
        .btn { 
            padding: 20px 40px; 
            font-size: 24px; 
            cursor: pointer; 
            border: none; 
            border-radius: 10px; 
            transition: 0.3s; 
            font-weight: bold;
        }
        .aceso { 
            background-color: #ffeb3b; 
            color: #000; 
            box-shadow: 0 0 20px #ffeb3b; 
        }
        .apagado { 
            background-color: #555; 
            color: #fff; 
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

    <h1>Acionamento do Exaustor</h1>
    <p>O status atual é: <span id="status-texto">Carregando...</span></p>
    
    <button id="botao-lampada" class="btn apagado" onclick="alternarLampada()">Aguardando...</button>

    <script>
        // =================================================================
        // CONFIGURAÇÃO DO SEU FIREBASE (COLE AS CHAVES DO SEU PAINEL AQUI)
        // =================================================================
       const firebaseConfig = {
    apiKey: "AIzaSyD0EuvxA9nmbB-D3Wls4pt9Bv5lB88Dd1g",
    authDomain: "acionamento-exaustor.firebaseapp.com",
    projectId: "acionamento-exaustor",
    storageBucket: "acionamento-exaustor.firebasestorage.app",
    messagingSenderId: "744403714348",
    appId: "1:744403714348:web:158cfd90721911f846ec89",
    measurementId: "G-VVRLK5C51V"
  };
        
        // Inicializa o Firebase na página Web
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let statusAtual = 0;

        // Escuta as mudanças no banco de dados em tempo real e muda o botão visualmente
        db.ref('/lampada').on('value', (snapshot) => {
            statusAtual = snapshot.val();
            const botao = document.getElementById('botao-lampada');
            const texto = document.getElementById('status-texto');

            if (statusAtual === 1) {
                texto.innerText = "LIGADO";
                botao.innerText = "DESLIGAR EXAUSTOR";
                botao.className = "btn aceso";
            } else {
                texto.innerText = "DESLIGADO";
                botao.innerText = "LIGAR EXAUSTOR";
                botao.className = "btn apagado";
            }
        });

        // Função executada ao clicar no botão: inverte o estado na nuvem
        function alternarLampada() {
            let novoStatus = statusAtual === 1 ? 0 : 1;
            db.ref('/').update({ lampada: novoStatus });
        }
    </script>
</body>
</html>
