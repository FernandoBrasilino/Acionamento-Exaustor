<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle do Exaustor Mundial</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            background: #222; 
            color: #fff; 
            padding-top: 40px; 
        }
        
        /* Estilo da Imagem no Topo */
        .logo-topo {
            display: block;
            margin: 0 auto 20px auto; /* Centraliza horizontalmente e adiciona margem inferior */
            max-width: 200px;        /* Ajuste a largura máxima conforme necessário */
            height: auto;
        }
        
        /* Estilo dos Botões */
        .container-botoes {
            margin: 20px 0;
        }
        .btn { 
            padding: 15px 35px; 
            font-size: 20px; 
            cursor: pointer; 
            border: none; 
            border-radius: 8px; 
            transition: 0.3s; 
            font-weight: bold;
            margin: 0 10px;
        }
        .btn-ligar {
            background-color: #4CAF50;
            color: white;
        }
        .btn-ligar:hover {
            box-shadow: 0 0 15px #4CAF50;
        }
        .btn-desligar {
            background-color: #f44336;
            color: white;
        }
        .btn-desligar:hover {
            box-shadow: 0 0 15px #f44336;
        }

        /* Estilo Visual da Lâmpada */
        .container-lampada {
            margin-top: 40px;
            display: inline-block;
        }
        .lampada {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #444;
            border: 4px solid #fff;
            margin: 0 auto;
            transition: all 0.4s ease;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        /* Estado da Lâmpada quando estiver Acesa */
        .lampada.acesa {
            background-color: #ffeb3b;
            box-shadow: 0 0 50px #ffeb3b, inset 0 0 10px #fff;
            border-color: #ffeb3b;
        }
        .suporte-lampada {
            width: 40px;
            height: 20px;
            background-color: #777;
            margin: 0 auto;
            border-radius: 0 0 5px 5px;
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

   <img src="logogiglio.png" alt="Logo Residencial" class="logo-topo">

    <h1>RESIDENCIAL COMENDADOR SILVIO GIGLIO</h1>
    <p>O status atual é: <span id="status-texto" style="font-weight: bold; font-size: 22px;">Carregando...</span></p>
    
    <div class="container-botoes">
        <button class="btn btn-ligar" onclick="ligarExaustor()">LIGAR</button>
        <button class="btn btn-desligar" onclick="desligarExaustor()">DESLIGAR</button>
    </div>

    <div class="container-lampada">
        <div id="lampada-visual" class="lampada"></div>
        <div class="suporte-lampada"></div>
    </div>

    <script>
        // =================================================================
        // CONFIGURAÇÃO DO SEU FIREBASE
        // =================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyD0EuvxA9nmbB-D3Wls4pt9Bv5lB88Dd1g",
            authDomain: "acionamento-exaustor.firebaseapp.com",
            projectId: "acionamento-exaustor",
            storageBucket: "acionamento-exaustor.firebasestorage.app",
            messagingSenderId: "744403714348",
            appId: "1:744403714348:web:158cfd90721911f846ec89",
            measurementId: "G-VVRLK5C51V"
        };
        
        // Inicializa o Firebase na página Web
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Escuta as mudanças no banco de dados em tempo real e atualiza a interface
        db.ref('/lampada').on('value', (snapshot) => {
            const statusAtual = snapshot.val();
            const texto = document.getElementById('status-texto');
            const lampadaVisual = document.getElementById('lampada-visual');

            if (statusAtual === 1) {
                texto.innerText = "LIGADO";
                texto.style.color = "#4CAF50";
                lampadaVisual.className = "lampada acesa"; // Acende a lâmpada na tela
            } else {
                texto.innerText = "DESLIGADO";
                texto.style.color = "#f44336";
                lampadaVisual.className = "lampada";       // Apaga a lâmpada na tela
            }
        });

        // Função do botão LIGAR: Envia o valor 1 para a nuvem
        function ligarExaustor() {
            db.ref('/').update({ lampada: 1 });
        }

        // Função do botão DESLIGAR: Envia o valor 0 para a nuvem
        function desligarExaustor() {
            db.ref('/').update({ lampada: 0 });
        }
    </script>
</body>
</html>
